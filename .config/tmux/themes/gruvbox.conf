# ═══════════════════════════════════════════════════════════════════════════════
# Gruvbox Dark Medium Theme for Tmux
# Generated by theme-manager.py
# ═══════════════════════════════════════════════════════════════════════════════

# Enable Colours
set -g default-terminal 'xterm-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

# Prefix Key
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Open new windows in current directory path
bind c new-window -c "#{pane_current_path}"

# Split Windows
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Reload Config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "󰑓 Config reloaded"

# Resize Panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Enable Mouse
set -g mouse on

# Scrollback
set -g history-limit 50000

# VIM motions
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Enable Mouse Dragging
unbind -T copy-mode-vi MouseDragEnd1Pane

# Status Line Position
set-option -g status-position top

##### Theme: Gruvbox Dark Medium #####
set -g status-style bg='#3c3836',fg='#98971a'
set -g message-style bg='#504945',fg='#98971a'
set -g pane-border-style fg='#665c54'
set -g pane-active-border-style fg='#98971a'
set -g mode-style bg='#98971a',fg='#282828'

# Status Left — Session with fixed tmux icon and semi-circles
set -g status-left-length 60
set -g status-left "#[fg=#458588,bg=#3c3836]#[fg=#282828,bg=#458588,bold] #S  #[fg=#458588,bg=#3c3836]"

set -g status-right-length 120
set -g status-right "#[fg=#282828]#[fg=#98971a,bg=#282828] 󰥔 %H:%M #[fg=#98971a] #[fg=#bdae93]󰃭 %Y-%m-%d #[fg=#282828]#[fg=#d79921,bg=#282828] 󰅒 #(whoami)@#H "

set -g window-status-format "#[fg=#bdae93] 󰈚 #I:#W "
set -g window-status-current-format "#[fg=#d5c4a1,bg=#504945,bold] 󰈚 #I:#W #[default]"
set -g window-status-separator ""

##### Auto Save / Restore #####
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

##### Pop-Up: Session List #####
bind w display-popup -E -w 30% -h 50% ~/.config/tmux/scripts/tmux-menu.sh

##### Pop-Up: Scratch Pad #####
unbind -T popup Tab
bind -n C-t display-popup -E -w 80% -h 80% ~/.config/tmux/scripts/tmux-scratch.sh
bind -T popup t send-keys t
bind -T popup q send-keys q
bind -T popup C-t detach
bind -T popup C-[ copy-mode

##### Pop-Up: LazyGit
bind g display-popup -d "#{pane_current_path}" -E -w 80% -h 80% -E lazygit

run '~/.tmux/plugins/tpm/tpm'
