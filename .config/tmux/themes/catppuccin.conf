# ═══════════════════════════════════════════════════════════════════════════════
# Catppuccin Mocha Theme for Tmux
# Generated by theme-manager.py
# ═══════════════════════════════════════════════════════════════════════════════

# Enable Colours
set -g default-terminal 'xterm-256color'
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'

# Prefix Key
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Open new windows in current directory path
bind c new-window -c "#{pane_current_path}"

# Split Windows
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Reload Config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "󰑓 Config reloaded"

# Resize Panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

# Enable Mouse
set -g mouse on

# Scrollback
set -g history-limit 50000

# VIM motions
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Enable Mouse Dragging
unbind -T copy-mode-vi MouseDragEnd1Pane

# Status Line Position
set-option -g status-position top

##### Theme: Catppuccin Mocha #####
set -g status-style bg='#181825',fg='#a6e3a1'
set -g message-style bg='#313244',fg='#a6e3a1'
set -g pane-border-style fg='#45475a'
set -g pane-active-border-style fg='#a6e3a1'
set -g mode-style bg='#a6e3a1',fg='#1e1e2e'

# Status Left — Session with fixed tmux icon and semi-circles
set -g status-left-length 60
set -g status-left "#[fg=#89b4fa,bg=#181825]#[fg=#1e1e2e,bg=#89b4fa,bold] #S  #[fg=#89b4fa,bg=#181825]"

set -g status-right-length 120
set -g status-right "#[fg=#1e1e2e]#[fg=#a6e3a1,bg=#1e1e2e] 󰥔 %H:%M #[fg=#a6e3a1] #[fg=#a6adc8]󰃭 %Y-%m-%d #[fg=#1e1e2e]#[fg=#f9e2af,bg=#1e1e2e] 󰅒 #(whoami)@#H "

set -g window-status-format "#[fg=#a6adc8] 󰈚 #I:#W "
set -g window-status-current-format "#[fg=#bac2de,bg=#313244,bold] 󰈚 #I:#W #[default]"
set -g window-status-separator ""

##### Auto Save / Restore #####
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

##### Pop-Up: Session List #####
bind w display-popup -E -w 30% -h 50% ~/.config/tmux/scripts/tmux-menu.sh

##### Pop-Up: Scratch Pad #####
unbind -T popup Tab
bind -n C-t display-popup -E -w 80% -h 80% ~/.config/tmux/scripts/tmux-scratch.sh
bind -T popup t send-keys t
bind -T popup q send-keys q
bind -T popup C-t detach
bind -T popup C-[ copy-mode

##### Pop-Up: LazyGit
bind g display-popup -d "#{pane_current_path}" -E -w 80% -h 80% -E lazygit

run '~/.tmux/plugins/tpm/tpm'
