[manager]
ratio          = [1, 2, 3]   
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "none"
show_hidden    = false
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 600
max_height = 900
image_filter  = "triangle"
image_quality = 75

[opener]
edit = [
  { run = 'nvim "$@"', desc = "Edit in Neovim", block = true },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open with default app" },
]
play = [
  { run = 'mpv "$@"', orphan = true, desc = "Play in mpv" },
]
extract = [
  { run = 'unar "$1"', desc = "Extract archive" },
]

[open]
rules = [
  { mime = "text/*",              use = "edit" },
  { mime = "application/json",   use = "edit" },
  { mime = "application/toml",   use = "edit" },
  { mime = "application/xml",    use = "edit" },
  { mime = "inode/x-empty",      use = "edit" },
  { mime = "video/*",            use = "play" },
  { mime = "audio/*",            use = "play" },
  { mime = "application/zip",    use = "extract" },
  { mime = "application/gzip",   use = "extract" },
  { mime = "application/x-tar",  use = "extract" },
  { mime = "application/x-bzip2", use = "extract" },
  { mime = "application/zstd",   use = "extract" },
  { mime = "*",                  use = "open" },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536_870_912 
image_bound      = [0, 0]
suppress_preload = false

[plugin]
prepend_previewers = [
  { mime = "application/zip",    run = "zip" },
  { mime = "application/gzip",   run = "zip" },
  { mime = "application/x-tar",  run = "zip" },
  { mime = "application/x-bzip2", run = "zip" },
  { mime = "application/zstd",   run = "zip" },
]

[input]
cursor_blink = true

[log]
enabled = false
