# ═══════════════════════════════════════════════════════════════════════════════
# Gruvbox Dark Medium Theme for Yazi
# Generated by theme-manager.py
# ═══════════════════════════════════════════════════════════════════════════════

[manager]
cwd = { fg = "458588" }

hovered         = { fg = "282828", bg = "98971a" }
preview_hovered = { underline = true }

find_keyword  = { fg = "d79921", bold = true, italic = true, underline = true }
find_position = { fg = "b16286", bg = "reset", bold = true, italic = true }

marker_copied   = { fg = "689d6a", bg = "689d6a" }
marker_cut      = { fg = "cc241d", bg = "cc241d" }
marker_marked   = { fg = "b16286", bg = "b16286" }
marker_selected = { fg = "d79921", bg = "d79921" }

tab_width          = 1
tab_use_inverse    = false
selected           = { fg = "ebdbb2", reversed = true }
count_copied       = { fg = "ebdbb2", bg = "458588" }
count_cut          = { fg = "ebdbb2", bg = "cc241d" }
count_selected     = { fg = "ebdbb2", bg = "d79921" }

border_symbol = "│"
border_style  = { fg = "928374" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "665c54", bg = "665c54" }

mode_normal = { fg = "282828", bg = "458588",    bold = true }
mode_select = { fg = "282828", bg = "d79921",  bold = true }
mode_unset  = { fg = "282828", bg = "b16286", bold = true }

progress_label  = { bold = true }
progress_normal = { fg = "458588", bg = "504945" }
progress_error  = { fg = "cc241d", bg = "504945" }

permissions_t = { fg = "689d6a" }
permissions_r = { fg = "d79921" }
permissions_w = { fg = "cc241d" }
permissions_x = { fg = "98971a" }
permissions_s = { fg = "665c54" }

[input]
border   = { fg = "458588" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "458588" }
active   = { fg = "b16286" }
inactive = {}

[tasks]
border  = { fg = "458588" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "504945" }
cand            = { fg = "689d6a" }
rest            = { fg = "665c54" }
desc            = { fg = "b16286" }
separator       = "  "
separator_style = { fg = "665c54" }

[help]
on      = { fg = "b16286" }
exec    = { fg = "689d6a" }
desc    = { fg = "665c54" }
hovered = { bg = "504945", bold = true }
footer  = { fg = "282828", bg = "ebdbb2" }

[filetype]
rules = [
  { mime = "image/*",     fg = "689d6a" },
  { mime = "video/*",     fg = "b16286" },
  { mime = "audio/*",     fg = "b16286" },
  { mime = "application/zip",   fg = "d79921" },
  { mime = "application/gzip",  fg = "d79921" },
  { mime = "application/x-tar", fg = "d79921" },
  { mime = "application/zstd",  fg = "d79921" },
  { name = "*",  is = "exec", fg = "98971a" },
  { name = ".*", fg = "665c54" },
  { name = "*", is = "link",    fg = "689d6a" },
  { name = "*", is = "orphan",  fg = "cc241d" },
]
