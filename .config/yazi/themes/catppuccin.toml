# ═══════════════════════════════════════════════════════════════════════════════
# Catppuccin Mocha Theme for Yazi
# Generated by theme-manager.py
# ═══════════════════════════════════════════════════════════════════════════════

[manager]
cwd = { fg = "89b4fa" }

hovered         = { fg = "1e1e2e", bg = "a6e3a1" }
preview_hovered = { underline = true }

find_keyword  = { fg = "f9e2af", bold = true, italic = true, underline = true }
find_position = { fg = "cba6f7", bg = "reset", bold = true, italic = true }

marker_copied   = { fg = "94e2d5", bg = "94e2d5" }
marker_cut      = { fg = "f38ba8", bg = "f38ba8" }
marker_marked   = { fg = "cba6f7", bg = "cba6f7" }
marker_selected = { fg = "f9e2af", bg = "f9e2af" }

tab_width          = 1
tab_use_inverse    = false
selected           = { fg = "cdd6f4", reversed = true }
count_copied       = { fg = "cdd6f4", bg = "89b4fa" }
count_cut          = { fg = "cdd6f4", bg = "f38ba8" }
count_selected     = { fg = "cdd6f4", bg = "f9e2af" }

border_symbol = "│"
border_style  = { fg = "6c7086" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "45475a", bg = "45475a" }

mode_normal = { fg = "1e1e2e", bg = "89b4fa",    bold = true }
mode_select = { fg = "1e1e2e", bg = "f9e2af",  bold = true }
mode_unset  = { fg = "1e1e2e", bg = "cba6f7", bold = true }

progress_label  = { bold = true }
progress_normal = { fg = "89b4fa", bg = "313244" }
progress_error  = { fg = "f38ba8", bg = "313244" }

permissions_t = { fg = "94e2d5" }
permissions_r = { fg = "f9e2af" }
permissions_w = { fg = "f38ba8" }
permissions_x = { fg = "a6e3a1" }
permissions_s = { fg = "45475a" }

[input]
border   = { fg = "89b4fa" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "89b4fa" }
active   = { fg = "cba6f7" }
inactive = {}

[tasks]
border  = { fg = "89b4fa" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "313244" }
cand            = { fg = "94e2d5" }
rest            = { fg = "45475a" }
desc            = { fg = "cba6f7" }
separator       = "  "
separator_style = { fg = "45475a" }

[help]
on      = { fg = "cba6f7" }
exec    = { fg = "94e2d5" }
desc    = { fg = "45475a" }
hovered = { bg = "313244", bold = true }
footer  = { fg = "1e1e2e", bg = "cdd6f4" }

[filetype]
rules = [
  { mime = "image/*",     fg = "94e2d5" },
  { mime = "video/*",     fg = "cba6f7" },
  { mime = "audio/*",     fg = "cba6f7" },
  { mime = "application/zip",   fg = "f9e2af" },
  { mime = "application/gzip",  fg = "f9e2af" },
  { mime = "application/x-tar", fg = "f9e2af" },
  { mime = "application/zstd",  fg = "f9e2af" },
  { name = "*",  is = "exec", fg = "a6e3a1" },
  { name = ".*", fg = "45475a" },
  { name = "*", is = "link",    fg = "94e2d5" },
  { name = "*", is = "orphan",  fg = "f38ba8" },
]
