[manager]
cwd = { fg = "cyan" }

hovered         = { fg = "black", bg = "blue" }
preview_hovered = { underline = true }

find_keyword  = { fg = "yellow", bold = true, italic = true, underline = true }
find_position = { fg = "magenta", bg = "reset", bold = true, italic = true }

marker_copied = { fg = "lightcyan",    bg = "lightcyan" }
marker_cut    = { fg = "lightred",     bg = "lightred" }
marker_marked = { fg = "lightmagenta", bg = "lightmagenta" }
marker_selected = { fg = "lightyellow", bg = "lightyellow" }

tab_width          = 1
tab_use_inverse    = false
selected           = { fg = "lightyellow",   reversed = true }
count_copied       = { fg = "white", bg = "cyan" }
count_cut          = { fg = "white", bg = "red" }
count_selected     = { fg = "white", bg = "yellow" }

border_symbol = "│"
border_style  = { fg = "gray" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "darkgray", bg = "darkgray" }

mode_normal = { fg = "black", bg = "blue",    bold = true }
mode_select = { fg = "black", bg = "yellow",  bold = true }
mode_unset  = { fg = "black", bg = "magenta", bold = true }

progress_label  = { bold = true }
progress_normal = { fg = "blue",    bg = "darkgray" }
progress_error  = { fg = "red",     bg = "darkgray" }

permissions_t = { fg = "lightcyan" }
permissions_r = { fg = "lightyellow" }
permissions_w = { fg = "lightred" }
permissions_x = { fg = "lightgreen" }
permissions_s = { fg = "darkgray" }

[input]
border   = { fg = "blue" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "blue" }
active   = { fg = "magenta" }
inactive = {}

[tasks]
border  = { fg = "blue" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "darkgray" }
cand            = { fg = "lightcyan" }
rest            = { fg = "darkgray" }
desc            = { fg = "magenta" }
separator       = "  "
separator_style = { fg = "darkgray" }

[help]
on      = { fg = "magenta" }
exec    = { fg = "cyan" }
desc    = { fg = "gray" }
hovered = { bg = "darkgray", bold = true }
footer  = { fg = "black", bg = "white" }

[filetype]
rules = [
  { mime = "image/*",     fg = "cyan" },
  { mime = "video/*",     fg = "magenta" },
  { mime = "audio/*",     fg = "magenta" },
  { mime = "application/zip",   fg = "yellow" },
  { mime = "application/gzip",  fg = "yellow" },
  { mime = "application/x-tar", fg = "yellow" },
  { mime = "application/zstd",  fg = "yellow" },
  { name = "*",  is = "exec", fg = "green" },
  { name = ".*", fg = "darkgray" },
  { name = "*", is = "link",    fg = "cyan" },
  { name = "*", is = "orphan",  fg = "red" },
]
