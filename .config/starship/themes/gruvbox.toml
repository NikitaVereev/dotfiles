# ═══════════════════════════════════════════════════════════════════════════════
# Gruvbox Dark Medium Theme for Starship
# Generated by theme-manager.py
# ═══════════════════════════════════════════════════════════════════════════════

palette         = "theme"
add_newline     = false
command_timeout = 1000
format = """$directory$character"""
right_format = """$all"""

[palettes.theme]
blue    = "#458588"
mauve   = "#b16286"
green   = "#98971a"
yellow  = "#d79921"
peach   = "#d65d0e"
red     = "#cc241d"
overlay = "#928374"

[character]
success_symbol = '[❯](bold green)'
error_symbol   = '[❯](bold red)'
vimcmd_symbol  = '[N](bold mauve)'

# ── Directory ──────────────────────────────────────────────────────────────────
[directory]
style             = "bold blue"
truncation_length = 4
truncate_to_repo  = true
format            = "[$path]($style)[$read_only]($read_only_style) "
read_only         = " 󰌾"

# ── Git ────────────────────────────────────────────────────────────────────────
[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style  = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style  = "bold yellow"
conflicted = "🏳️"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "${count}"
stashed    = "${count}"
modified   = "${count}"
staged     = "${count}"
renamed    = "${count}"
deleted    = "${count}"

# ── Languages ──────────────────────────────────────────────────────────────────
[nodejs]
symbol         = " "
style          = "bold green"
format         = "[$symbol$version]($style) "
detect_files   = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]

[package]
symbol = "󰏗 "
style  = "bold peach"
format = "[$symbol$version]($style) "
display_private = true

[python]
symbol       = " "
style        = "bold yellow"
format       = "[$symbol$version]($style) "
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version"]

[java]
symbol       = " "
style        = "bold red"
format       = "[$symbol$version]($style) "
detect_files = ["build.gradle", "build.gradle.kts", "AndroidManifest.xml"]

[ruby]
symbol       = " "
style        = "bold peach"
format       = "[$symbol$version]($style) "
detect_files = ["Gemfile", "Podfile"]

[golang]
symbol       = " "
style        = "bold blue"
format       = "[$symbol$version]($style) "
detect_files = ["go.mod", "go.sum", "main.go"]

[rust]
symbol       = " "
style        = "bold orange"
format       = "[$symbol$version]($style) "
detect_files = ["Cargo.toml", "Cargo.lock"]

# ── Tools ──────────────────────────────────────────────────────────────────────
[docker_context]
symbol = " "
style  = "bold blue"
format = "[$symbol]($style) "
detect_files = ["docker-compose.yml", "Dockerfile", "docker-compose.yaml"]
detect_extensions = ["dockerfile"]

[aws]
symbol = "󰸏 "
style  = "bold yellow"
format = "[$symbol($profile )(\\($region\\) )]($style)"
disabled = false

[kubernetes]
symbol = "󱃾 "
style  = "bold blue"
format = "[$symbol$context( \\($namespace\\))]($style) "
disabled = false

# ── Time ───────────────────────────────────────────────────────────────────────
[time]
disabled    = false
style       = "bold overlay"
format      = "[$time]($style)"
time_format = "%H:%M"
