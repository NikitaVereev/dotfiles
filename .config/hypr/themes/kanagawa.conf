# ═══════════════════════════════════════════════════════════════════════════
# KANAGAWA WAVE — Light / Woodblock Print
# Katsushika Hokusai, "The Great Wave off Kanagawa", 1831
# Warm cream sky · prussian blue waves · ochre highlights
# ═══════════════════════════════════════════════════════════════════════════

# Active window border: prussian blue → ochre gold
$active_border   = rgba(1A3A5Cee) rgba(C8882Aee) 45deg
$inactive_border = rgba(D8CCA8aa)

# Shadows
$shadow_color_active   = rgba(2C1F1488)
$shadow_color_inactive = rgba(2C1F1444)

# Backgrounds
$bg_color = rgba(F4EAD0ff)
$bg_alt   = rgba(EDE3C6ff)
$bg_dim   = rgba(E2D4B0ff)

# Foregrounds
$fg_color = rgba(1A3A5Cff)
$fg_dim   = rgba(2E5F8Aff)

# Accents
$red    = rgba(A03030ff)
$orange = rgba(9A4810ff)
$yellow = rgba(906010ff)
$green  = rgba(2A6030ff)
$aqua   = rgba(1A6878ff)
$blue   = rgba(1A4A90ff)
$purple = rgba(6A2088ff)
$pink   = rgba(8B2A4Aff)
