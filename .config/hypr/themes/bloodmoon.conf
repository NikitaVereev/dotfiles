# ═══════════════════════════════════════════════════════════════════════════
# BLOODMOON — Vivid Crimson Dark
# ═══════════════════════════════════════════════════════════════════════════

# Active window border
$active_border   = rgba(E03050cc) rgba(7A1828cc) 45deg
$inactive_border = rgba(1E1616aa)

# Shadows
$shadow_color_active   = rgba(000000e0)
$shadow_color_inactive = rgba(00000090)

# Backgrounds
$bg_color = rgba(131010ff)
$bg_alt   = rgba(1E1616ff)
$bg_dim   = rgba(0D0A0Aff)

# Foregrounds
$fg_color = rgba(F2E8E4ff)
$fg_dim   = rgba(D8CECAff)

# Accents
$red    = rgba(E03050ff)
$amber  = rgba(E09030ff)
$ochre  = rgba(D09828ff)
$green  = rgba(5AAA6Aff)
$steel  = rgba(6A9EC8ff)
$rust   = rgba(C07050ff)
$purple = rgba(C878C0ff)
$teal   = rgba(50A090ff)
