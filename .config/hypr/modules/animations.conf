###################
#### ANIMATIONS ###
###################

animations {
    enabled = true

    #        NAME,    X0,    Y0,   X1,   Y1
    bezier = expo,    0.19,  1.0,  0.22, 1.0   # easeOutExpo — резкий старт, мягкое приземление
    bezier = smooth,  0.4,   0.0,  0.2,  1.0   # стандартный material ease
    bezier = swift,   0.55,  0.0,  0.1,  1.0   # быстрое закрытие

    #          NAME,              ONOFF, SPEED, CURVE,   [STYLE]
    animation = windows,          1,     4,     expo,    popin 85%
    animation = windowsIn,        1,     4,     expo,    popin 85%
    animation = windowsOut,       1,     2,     swift,   popin 85%

    animation = border,           1,     5,     smooth

    animation = fade,             1,     3,     smooth
    animation = fadeIn,           1,     3,     smooth
    animation = fadeOut,          1,     2,     smooth

    animation = layers,           1,     3,     expo,    fade
    animation = layersIn,         1,     3,     expo,    fade
    animation = layersOut,        1,     2,     swift,   fade
    animation = fadeLayersIn,     1,     2,     smooth
    animation = fadeLayersOut,    1,     2,     smooth

    animation = workspaces,       1,     4,     smooth,  slide
    animation = workspacesIn,     1,     4,     smooth,  slide
    animation = workspacesOut,    1,     4,     smooth,  slide
}
