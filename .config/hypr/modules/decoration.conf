#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 10
    gaps_out = 16
    border_size = 0
    col.active_border = $active_border 
    col.inactive_border = $inactive_border 
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 20
    rounding_power = 10

    active_opacity = 1
    inactive_opacity = 1

    shadow {
        enabled = true
        range = 40
        render_power = 4
        offset = 0 0
        color = $shadow_color_active
        color_inactive = $shadow_color_inactive
    }

    blur {
        enabled = true
        size = 2
        # passes = 3
        passes = 1
        # noise = 0.1
        # vibrancy = 0.2
        vibrancy = 0.1696
        ignore_opacity = true
        new_optimizations = true
        xray = true
        special = true
        popups = true
    }
}

