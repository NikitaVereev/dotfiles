##############################
### WINDOWS AND WORKSPACES ###
##############################

# --- 1. TAG DEFINITIONS ---

windowrule {
    name = browser-tag
    tag = +browser
    match:class = ^([Cc]hromium|[Ff]irefox|[Bb]rave-browser)$
}

windowrule {
    name = terminal-tag
    tag = +terminal
    match:class = ^([Kk]itty|[Aa]lacritty)$
}

windowrule {
    name = filemanager-tag
    tag = +file-manager
    match:class = ^([Tt]hunar)$
}

windowrule {
    name = im-tag
    tag = +im
    match:class = ^(telegram-desktop|[Dd]iscord|[Ww]ebCord)$
}

windowrule {
    name = projects-tag
    tag = +projects
    match:class = ^(Code|VSCodium|neovide|jetbrains-.+)$
}

windowrule {
    name = games-tag
    tag = +games
    match:class = ^(gamescope|steam_app_\d+)$
}

# --- Opacity ---
windowrule {
    name = opacity-browser
    opacity = 1.0 1.0
    match:tag = browser*
}

windowrule {
    name = opacity-im
    opacity = 0.85 0.85
    match:tag = im*
}

windowrule {
    name = opacity-files
    opacity = 0.9 0.8
    match:tag = file-manager*
}

windowrule {
    name = opacity-term
    opacity = 0.8 0.8
    match:tag = terminal*
}

# --- 3. SMART RULES ---

windowrule {
    name = smart-popups
    float = 1
    size = 70% 60%
    center = 1
    match:title = ^(Save As|Open File|Open Files)$
}

windowrule {
    name = auth-popups
    float = 1
    center = 1
    match:title = ^(Authentication Required)$
}

windowrule {
    name = thunar-dialogs
    float = 1
    center = 1
    match:class = ([Tt]hunar)
    match:title = negative:(.*[Tt]hunar.*)
}

windowrule {
    name = pip
    float = 1
    pin = 1
    move = 72% 7%
    size = 25% 25%
    match:title = ^(Picture-in-Picture)$
}

windowrule {
    name = idle-fullscreen
    idle_inhibit = fullscreen
    match:fullscreen = 1
}

windowrule {
    name = suppress-maximize-events
    suppress_event = maximize
    match:class = .*
}

windowrule {
  name = fix-xwayland-drags
  match:class = ^$
  match:title = ^$
  match:xwayland = true
  match:float = true
  match:fullscreen = false
  match:pin = false

  no_focus = true
}

windowrule {
  name = move-hyprland-run
  match:class = hyprland-run
  move = 20 monitor_h-120
  float = yes
}

windowrule {
    name = games-logic
    fullscreen = 1
    workspace = 2
    match:tag = games*
}

# --- 4. LAYER RULES ---

layerrule {
    name = waybar-blur
    blur = 1
    ignore_alpha = 0.5
    match:namespace = waybar
}

layerrule {
    name = rofi-blur
    blur = 1
    ignore_alpha =  0.5
    match:namespace = rofi
}

layerrule {
    name = rofi-anim
    animation = popin 95%
    match:namespace = rofi
}

layerrule = match:namespace swaync-control-center, blur on
layerrule = match:namespace swaync-control-center, ignore_alpha 0.5

layerrule = match:namespace swaync-notification-window, blur on
layerrule = match:namespace swaync-notification-window, ignore_alpha 0.5
