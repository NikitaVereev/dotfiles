# ══════════════════════════════════════════════════════════════
# Kitty Configuration
# ══════════════════════════════════════════════════════════════
# Keybinding layers:
#   - Hyprland (WM): Alt-based (unchanged)
#   - Kitty: Ctrl+Shift-based (splits, tabs) - matches Ghostty
#   - Tmux: Ctrl+A prefix (panes inside terminal)
# ══════════════════════════════════════════════════════════════

include ~/.config/kitty/themes/current.conf

# ── Font ──────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Mono
font_size        11.0
bold_font        auto
italic_font      auto
bold_italic_font auto

# ── Cursor ────────────────────────────────────────────────────
cursor_trail            3
cursor_shape            beam
cursor_blink_interval   0.5
cursor_stop_blinking_after 5.0

# ── Window ────────────────────────────────────────────────────
sync_to_monitor      no
remember_window_size no
window_padding_width 25
hide_window_decorations yes

# ── Appearance ────────────────────────────────────────────────
background_opacity    0.80
dynamic_background_opacity yes
background_tint       0.3
background_blur       64
confirm_os_window_close 0

# ── Remote Control (for dynamic theme switching) ──────────────
allow_remote_control yes
listen_on unix:/tmp/kitty

# ── Terminal ──────────────────────────────────────────────────
term xterm-256color

# ── Underline & URLs ──────────────────────────────────────────
undercurl_style    thin-dense
url_style          curly
show_hyperlink_targets yes

# ── Performance ───────────────────────────────────────────────
repaint_delay 8
input_delay   3

# ══════════════════════════════════════════════════════════════
# Keybindings (Ctrl+Shift to match Ghostty, avoid Hyprland Alt)
# ══════════════════════════════════════════════════════════════

# ── Tabs ──────────────────────────────────────────────────────
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+left_bracket previous_tab
map ctrl+shift+right_bracket next_tab
map ctrl+shift+tab next_tab
map ctrl+shift+page_up previous_tab
map ctrl+shift+page_down next_tab

# ── Windows (splits) ──────────────────────────────────────────
map ctrl+shift+e launch --location=hsplit
map ctrl+shift+o launch --location=vsplit
map ctrl+shift+enter toggle_maximized

# ── Window navigation ─────────────────────────────────────────
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

# ── Window resize ─────────────────────────────────────────────
map ctrl+shift+left resize_window narrower
map ctrl+shift+down resize_window shorter
map ctrl+shift+up resize_window taller
map ctrl+shift+right resize_window wider

# ── Clipboard ─────────────────────────────────────────────────
map ctrl+shift+c copy_or_interrupt
map ctrl+shift+v paste_from_clipboard

# ── Font size ─────────────────────────────────────────────────
map ctrl+equal change_font_size all +1
map ctrl+minus change_font_size all -1
map ctrl+0 change_font_size all 0

# ── Misc ──────────────────────────────────────────────────────
map ctrl+shift+n new_os_window
map ctrl+shift+q quit
map ctrl+shift+f toggle_fullscreen
map ctrl+shift+a select_all
